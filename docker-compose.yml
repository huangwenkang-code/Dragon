version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dragon
      POSTGRES_PASSWORD: dragon
      POSTGRES_DB: dragon_engine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragon"]
      interval: 5s

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

  graph-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
    ports:
      - "8002:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://dragon:dragon@postgres:5432/dragon_engine
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./services/graph-service:/app/services/graph-service
      - ./shared:/app/shared
    command: uvicorn services.graph-service.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
  pg_data:
  chroma_data:
